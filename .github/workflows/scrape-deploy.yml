name: Scrape & Deploy Release Notes

on:
  schedule:
    - cron: "0 6 * * 1"   # every Monday 06:00 UTC
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "scraper/**"
      - "web/**"
      - "tests/**"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests beautifulsoup4 lxml pytest
      - name: Run parser tests (no network needed)
        run: python -m pytest tests/ -v

  scrape-and-deploy:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install requests beautifulsoup4 lxml

      - name: Restore cached database
        uses: actions/cache@v4
        id: db-cache
        with:
          path: db/release_notes.db
          key: release-notes-db-${{ hashFiles('scraper/scraper.py') }}
          restore-keys: release-notes-db-

      - name: Run scraper
        # --resume  : skip already-scraped old releases
        # --recheck 10 : always re-fetch last 10 releases to detect retroactive amendments
        # --concurrency 4 : parallel fetches (polite — 0.5s delay per worker)
        run: python scraper/scraper.py --resume --recheck 10 --concurrency 4

      - name: Copy DB to web directory
        run: cp db/release_notes.db web/release_notes.db

      - name: Save updated database
        uses: actions/cache/save@v4
        with:
          path: db/release_notes.db
          key: release-notes-db-${{ hashFiles('db/release_notes.db') }}-${{ github.run_id }}

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./web
          publish_branch: gh-pages
          cname: ""   # set your custom domain here if needed
